services:
  traveling-app:
    container_name: traveling-app
    build:
      context: ..
      dockerfile: src/TravelingApp.Ui/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:${ASPNETCORE_HTTP_PORTS}
      - ConnectionStrings__TravelingAppDbConnection=Host=postgres-traveling-app;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__RedisDbConnection=redis-traveling-app:6379
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpireMinutes=${JWT_EXPIRE_MINUTES}
    ports:
      - "${TRAVELINGAPP_PORT}:${ASPNETCORE_HTTP_PORTS}"
    depends_on:
      postgres-traveling-app:
        condition: service_healthy
      redis-traveling-app:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS}"
          memory: "${LIMIT_MEMORY}"
        reservations:
          cpus: "${RESERVE_CPUS}"
          memory: "${RESERVE_MEMORY}"
    restart: always
    networks:
      - traveling-network

  postgres-traveling-app:
    container_name: postgres-traveling-app
    image: postgres:17
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - traveling-network

  redis-traveling-app:
    container_name: redis-traveling-app
    image: redis:7.0.15
    command: ["redis-server", "--save", "", "--appendonly", "no", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT}:6379"
    restart: always
    networks:
      - traveling-network

volumes:
  postgres_data:

networks:
  traveling-network:
    driver: bridge
