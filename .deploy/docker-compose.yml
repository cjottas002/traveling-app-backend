services:
  traveling-app:
    container_name: traveling-app
    build:
      context: ..
      dockerfile: src/TravelingApp.Ui/Dockerfile
    depends_on:
      postgres-traveling-app:
        condition: service_healthy
      redis-traveling-app:
        condition: service_started
    networks:
      - traveling-network

  postgres-traveling-app:
    container_name: postgres-traveling-app
    image: postgres:17
    networks:
      - traveling-network

  redis-traveling-app:
    container_name: redis-traveling-app
    image: redis:7.0.15
    networks:
      - traveling-network

networks:
  traveling-network:
    driver: bridge
